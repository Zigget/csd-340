    <script>
        function changeImage() {
            var image = document.getElementById("myImage");
            var caption = document.getElementById("imageName");


            if (image.src.match("Ace")) {
                image.src = "back.jpg";
                caption.innerHTML = "Deck";
            } else {
                image.src = "Ace.png";
                caption.innerHTML = "Ace";
            }
        }
    </script>
</head>

<body>

<div class="container">

<h1>Pick a card</h1>

<div class="card">

<h2>Guess the card</h2>

<img id="myImage" src="back.jpg" onclick="changeImage()" alt="Card">
<h3 id="imageName" class="caption">Ace</h3>

</div>
